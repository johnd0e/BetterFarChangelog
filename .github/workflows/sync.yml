name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (force reset)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(gh api repos/FarGroup/FarManager/git/refs/heads/master --jq '.object.sha')

          CURRENT_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" --jq '.object.sha')

          if [ "$UPSTREAM_SHA" = "$CURRENT_SHA" ]; then
            echo "Branch is already up to date"
            exit 0
          fi

          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" \
            -f sha="$UPSTREAM_SHA" \
            -F force=true

          echo "Successfully force-synced master to upstream ($UPSTREAM_SHA)"
