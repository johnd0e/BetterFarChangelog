name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (non-fork mirror)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! UPSTREAM_SHA=$(gh api repos/FarGroup/FarManager/git/refs/heads/master --jq '.object.sha'); then
            echo "::error::Failed to query upstream master ref."
            exit 1
          fi

          if ! printf '%s\n' "$UPSTREAM_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::Invalid SHA format received from upstream master ref."
            echo "Unexpected SHA value: $UPSTREAM_SHA"
            exit 1
          fi

          REF_STATUS=$(mktemp)

          if gh api --include --silent "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" >"$REF_STATUS" 2>&1; then
            EXPECTED_HTTP_CODE=200
          else
            EXPECTED_HTTP_CODE=404
          fi

          HTTP_CODE=$(awk 'NR == 1 { print $2 }' "$REF_STATUS")

          if [ "$HTTP_CODE" != "$EXPECTED_HTTP_CODE" ]; then
            echo "::error::Failed to query current master ref."
            cat "$REF_STATUS"
            rm -f "$REF_STATUS"
            exit 1
          fi

          rm -f "$REF_STATUS"

          if [ "$HTTP_CODE" = "200" ]; then
            if ! CURRENT_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" --jq '.object.sha'); then
              echo "::error::Failed to query current master ref."
              exit 1
            fi

            if ! printf '%s\n' "$CURRENT_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::error::Invalid SHA format received from current master ref."
              echo "Unexpected SHA value: $CURRENT_SHA"
              exit 1
            fi

            if [ "$UPSTREAM_SHA" = "$CURRENT_SHA" ]; then
              echo "Branch is already up to date"
              exit 0
            fi

            if ! gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" \
              -f sha="$UPSTREAM_SHA" \
              -F force=true; then
              echo "::error::Failed to update current master ref."
              exit 1
            fi
            echo "Successfully force-synced master to upstream ($UPSTREAM_SHA)"
          else
            if ! gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref='refs/heads/master' \
              -f sha="$UPSTREAM_SHA"; then
              echo "::error::Failed to create current master ref."
              exit 1
            fi

            echo "Successfully created master from upstream ($UPSTREAM_SHA)"
          fi
