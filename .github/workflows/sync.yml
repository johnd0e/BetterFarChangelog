name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (non-fork mirror)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --bare \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            repo.git
          cd repo.git
          git remote add upstream https://github.com/FarGroup/FarManager.git
          git fetch upstream master --no-tags
          git push origin refs/remotes/upstream/master:refs/heads/master --force
          echo "Successfully synced master to upstream"
