name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (GitHub API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE_FILE=$(mktemp)
          if ! gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -f branch='master' > "$RESPONSE_FILE"; then
            echo "::error::Upstream sync failed."
            cat "$RESPONSE_FILE"
            rm -f "$RESPONSE_FILE"
            exit 1
          fi

          MESSAGE=$(jq -r '.message // empty' "$RESPONSE_FILE")

          case "$MESSAGE" in
            "Branch is already up to date"|"Successfully fetched and fast-forwarded from upstream"|"Successfully fetched and merged from upstream")
              echo "$MESSAGE"
              ;;
            *)
              echo "::warning::Unexpected upstream sync response: ${MESSAGE:-no message}"
              ;;
          esac

          rm -f "$RESPONSE_FILE"
