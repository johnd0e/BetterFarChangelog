name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (non-fork mirror)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(gh api repos/FarGroup/FarManager/git/refs/heads/master --jq '.object.sha')
          REF_ERROR=$(mktemp)

          if CURRENT_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" --jq '.object.sha' 2>"$REF_ERROR"); then
            rm -f "$REF_ERROR"

            if [ "$UPSTREAM_SHA" = "$CURRENT_SHA" ]; then
              echo "Branch is already up to date"
              exit 0
            fi

            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" \
              -f sha="$UPSTREAM_SHA" \
              -F force=true
            echo "Successfully force-synced master to upstream ($UPSTREAM_SHA)"
          else
            if ! grep -q 'HTTP 404' "$REF_ERROR"; then
              echo "::error::Failed to query current master ref."
              cat "$REF_ERROR"
              rm -f "$REF_ERROR"
              exit 1
            fi

            rm -f "$REF_ERROR"
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref='refs/heads/master' \
              -f sha="$UPSTREAM_SHA"

            echo "Successfully created master from upstream ($UPSTREAM_SHA)"
          fi
