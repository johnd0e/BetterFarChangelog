name: Sync upstream master

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync master from upstream (non-fork mirror)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(gh api repos/FarGroup/FarManager/git/refs/heads/master --jq '.object.sha')
          REF_RESPONSE=$(mktemp)
          HTTP_CODE=$(curl -sS \
            -o "$REF_RESPONSE" \
            -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/heads/master")

          if [ "$HTTP_CODE" = "200" ]; then
            CURRENT_SHA=$(jq -r '.object.sha' "$REF_RESPONSE")
            rm -f "$REF_RESPONSE"

            if [ "$UPSTREAM_SHA" = "$CURRENT_SHA" ]; then
              echo "Branch is already up to date"
              exit 0
            fi

            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/master" \
              -f sha="$UPSTREAM_SHA" \
              -F force=true
            echo "Successfully force-synced master to upstream ($UPSTREAM_SHA)"
          else
            if [ "$HTTP_CODE" != "404" ]; then
              echo "::error::Failed to query current master ref (HTTP $HTTP_CODE)."
              cat "$REF_RESPONSE"
              rm -f "$REF_RESPONSE"
              exit 1
            fi

            rm -f "$REF_RESPONSE"
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref='refs/heads/master' \
              -f sha="$UPSTREAM_SHA"

            echo "Successfully created master from upstream ($UPSTREAM_SHA)"
          fi
