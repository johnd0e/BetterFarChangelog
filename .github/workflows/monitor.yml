name: Release Builds Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      start_tag:
        description: 'Start from this tag (example: builds/6676). Empty = dry-run for the latest build only.'
        required: false
        type: string
      limit:
        description: 'Maximum number of builds to process. 0 = no limit.'
        required: false
        default: '0'
        type: string
  push:
    branches:
      - automation

env:
  UPSTREAM_REPO: 'https://github.com/FarGroup/FarManager.git'
  UPSTREAM_COMPARE_BASE: 'https://github.com/FarGroup/FarManager/compare'
  UPSTREAM_COMMIT_BASE: 'https://github.com/FarGroup/FarManager/commit'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream master and tags
        run: |
          git remote add upstream "$UPSTREAM_REPO" 2>/dev/null || true
          git fetch upstream master --force
          git fetch upstream --tags --force

          if ! git ls-remote --exit-code upstream refs/heads/master > /dev/null 2>&1; then
            echo "::error::Upstream branch 'master' not found in $UPSTREAM_REPO."
            exit 1
          fi

          TAG_COUNT=$(git tag --list 'builds/*' | wc -l | tr -d ' ')
          echo "builds/* tag count after fetch: $TAG_COUNT"
          if [ "$TAG_COUNT" -eq 0 ]; then
            echo "::error::No tags matching 'builds/*' found after fetching upstream."
            exit 1
          fi

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Diagnose environment
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- ls scripts/ ---"
          ls -la scripts/
          echo "--- head of process_tags.sh ---"
          head -3 scripts/process_tags.sh
          echo "--- git tag count ---"
          git tag --list 'builds/*' | wc -l
          echo "--- last 3 builds/* tags ---"
          git tag --list 'builds/*' --sort=version:refname | tail -3

      - name: Process tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_TAG: ${{ inputs.start_tag || '' }}
          LIMIT: ${{ inputs.limit || '0' }}
          UPSTREAM_COMPARE_BASE: ${{ env.UPSTREAM_COMPARE_BASE }}
          UPSTREAM_COMMIT_BASE: ${{ env.UPSTREAM_COMMIT_BASE }}
        run: |
          if [ -z "$START_TAG" ]; then
            ./scripts/process_tags.sh --dry-run 2>&1
          else
            ./scripts/process_tags.sh --start "$START_TAG" --limit "$LIMIT" 2>&1
          fi
