name: Release Builds Monitor

on:
  schedule:
    # Run daily at midnight UTC. Scheduled workflows only run on the default branch.
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Manual trigger available from the Actions tab (no inputs required).
  push:
    # Re-trigger automatically when automation code in this branch is updated.
    branches:
      - automation

env:
  UPSTREAM_REPO: "https://github.com/FarGroup/FarManager.git"
  # Used for the Commit Statuses API: POST /repos/{owner}/{repo}/statuses/{sha}
  # We post statuses TO upstream commits, so these must point at the upstream repo.
  UPSTREAM_OWNER: "FarGroup"
  UPSTREAM_REPO_NAME: "FarManager"

jobs:
  process-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Push tags and create GitHub Releases in our fork
      statuses: write   # Post CI commit statuses (requires token with repo scope for external repos)

    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for git log between tags

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Process tags and create releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          UPSTREAM_OWNER: ${{ env.UPSTREAM_OWNER }}
          UPSTREAM_REPO_NAME: ${{ env.UPSTREAM_REPO_NAME }}
        run: ./scripts/process_tags.sh
