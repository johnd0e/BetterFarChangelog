name: Release Builds Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      start_tag:
        description: 'Start from this tag (example: builds/6676). Empty = dry-run for the latest tag only.'
        required: false
        type: string
      limit:
        description: 'Maximum number of tags to process after start_tag. 0 = no limit.'
        required: false
        default: '0'
        type: string
  push:
    branches:
      - automation

env:
  UPSTREAM_REPO: 'https://github.com/FarGroup/FarManager.git'
  UPSTREAM_COMPARE_BASE: 'https://github.com/FarGroup/FarManager/compare'
  UPSTREAM_COMMIT_BASE: 'https://github.com/FarGroup/FarManager/commit'

jobs:
  process-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream tags and history
        run: |
          git remote add upstream "$UPSTREAM_REPO" 2>/dev/null || true
          git fetch upstream --tags --force

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Process tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_TAG: ${{ inputs.start_tag || '' }}
          LIMIT: ${{ inputs.limit || '0' }}
          UPSTREAM_COMPARE_BASE: ${{ env.UPSTREAM_COMPARE_BASE }}
          UPSTREAM_COMMIT_BASE: ${{ env.UPSTREAM_COMMIT_BASE }}
        run: |
          if [ -z "$START_TAG" ]; then
            ./scripts/process_tags.sh --dry-run
          else
            ./scripts/process_tags.sh --start "$START_TAG" --limit "$LIMIT"
          fi
