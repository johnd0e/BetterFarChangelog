name: Release Builds Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      start_tag:
        description: 'Publish starting from this tag (example: builds/6676). Empty = auto: find and publish all unreleased tags.'
        required: false
        type: string
      limit:
        description: 'Max builds to process this run (0 = use MAX_BUILDS_PER_RUN default).'
        required: false
        default: '0'
        type: string
  push:
    branches:
      - automation

env:
  UPSTREAM_REPO: 'https://github.com/FarGroup/FarManager.git'
  UPSTREAM_COMPARE_BASE: 'https://github.com/FarGroup/FarManager/compare'
  UPSTREAM_COMMIT_BASE: 'https://github.com/FarGroup/FarManager/commit'
  MAX_BUILDS_PER_RUN: '10'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream master and tags
        run: |
          git remote add upstream "$UPSTREAM_REPO" 2>/dev/null || true
          git fetch upstream master --force
          git fetch upstream --tags --force

          TAG_COUNT=$(git tag --list 'builds/*' | wc -l | tr -d ' ')
          echo "builds/* tag count: $TAG_COUNT"
          if [ "$TAG_COUNT" -eq 0 ]; then
            echo "::error::No tags matching 'builds/*' found after fetching upstream."
            exit 1
          fi

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Process tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_TAG: ${{ inputs.start_tag || '' }}
          LIMIT: ${{ inputs.limit || '0' }}
          MAX_BUILDS_PER_RUN: ${{ env.MAX_BUILDS_PER_RUN }}
          UPSTREAM_COMPARE_BASE: ${{ env.UPSTREAM_COMPARE_BASE }}
          UPSTREAM_COMMIT_BASE: ${{ env.UPSTREAM_COMMIT_BASE }}
        run: |
          if [ -n "$START_TAG" ]; then
            ./scripts/process_tags.sh --start "$START_TAG" --limit "$LIMIT"
          else
            ./scripts/process_tags.sh --auto
          fi
